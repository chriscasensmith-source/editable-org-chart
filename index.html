function applyEdits(){const raw=csvEditorEl.value,p=parseCSV(raw);if(!p.length){editorMessageEl.textContent='CSV parse error.';return;}state.rawCSV=raw;state.rows=p;renderChart();editorMessageEl.textContent='Edits applied in browser.';}
function downloadCsv(){const b=new Blob([csvEditorEl.value],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='org_data.csv';a.click();URL.revokeObjectURL(u)}
function bindEvents(){document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{state.scenario=btn.dataset.scenario;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderChart();}));document.getElementById('editToggle').addEventListener('click',()=>{editorPanelEl.classList.toggle('open');if(editorPanelEl.classList.contains('open'))syncEditor();});document.getElementById('applyEditsBtn').addEventListener('click',applyEdits);document.getElementById('downloadCsvBtn').addEventListener('click',downloadCsv);document.getElementById('printBtn').addEventListener('click',()=>window.print());}
window.addEventListener('resize',()=>{if(state.scenario==='current')fitCurrent();});
async function loadData(){try{const r=await fetch(`org_data.csv?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error();state.rawCSV=await r.text();state.rows=parseCSV(state.rawCSV);dataSourceMessageEl.textContent='Loaded live data from org_data.csv.';}catch(e){state.rawCSV=EMBEDDED_CSV;state.rows=parseCSV(state.rawCSV);dataSourceMessageEl.textContent='Using embedded fallback data.';}bindEvents();renderChart();}
loadData();
</script></body></html>
