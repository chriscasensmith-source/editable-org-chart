<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editable Org Chart</title>
<style>
/* ===== Theme tokens: edit colors here ===== */
:root{
  --c-exec-blue:#255583;
  --c-level-blue:#3a7ab6;
  --c-packaging:#b7d9be;
  --c-processing:#efe1b8;
  --c-coe:#d2c7e5;
  --c-support:#a7bfd7;
  --c-side-note:#fff200;
  --c-connector:#b7c5d8;
  --c-card-border:#b8c4d9;
  --c-card-bg:#ffffff;
  --c-bg:#f4f6fa;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--c-bg);color:#1f2937}
.container{max-width:1560px;margin:0 auto;padding:14px}
h1{margin:0 0 8px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid #d5deea;border-radius:10px;padding:10px;position:sticky;top:0;z-index:10}
.btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:7px 11px;font-weight:700;cursor:pointer}.btn.active{background:#dbeafe}
.legend{margin-left:auto;font-size:12px;color:#64748b}
.chart-shell{margin-top:10px;background:#fff;border:1px solid #d5deea;border-radius:12px;padding:14px;overflow:auto;min-height:620px;max-height:78vh}
.chart-shell.future{min-height:auto;max-height:none;overflow:visible}

/* current tree */
.tree ul{padding-top:22px;position:relative;display:flex;justify-content:center;margin:0;width:max-content}
.tree li{list-style:none;text-align:center;position:relative;padding:22px 10px 0;min-width:240px}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--c-connector);width:50%;height:22px}
.tree li::after{right:auto;left:50%;border-left:2px solid var(--c-connector)}
.tree li:only-child::before,.tree li:only-child::after{display:none}.tree li:first-child::before,.tree li:last-child::after{border:0}.tree li:last-child::before{border-right:2px solid var(--c-connector)}.tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--c-connector);height:22px}

.card{border:1px solid var(--c-card-border);border-left:6px solid #4b83d6;background:var(--c-card-bg);border-radius:10px;padding:10px;min-height:112px;box-shadow:0 1px 4px rgba(15,23,42,.06);text-align:left;cursor:pointer;max-width:260px}
.card:hover{box-shadow:0 4px 10px rgba(15,23,42,.12)}
.card.vacant{border-left-color:#f97316;background:#fff7ed}
.card .name{font-size:17px;font-weight:800;line-height:1.2}.card .title{font-size:14px;font-weight:600;color:#334155;margin-top:2px}.card .meta{font-size:12px;color:#64748b;margin-top:5px}.card .notes{font-size:11px;color:#475569;margin-top:7px;border-top:1px dashed rgba(71,85,105,.3);padding-top:6px;line-height:1.3}

/* future board */
.future-wrap{display:flex;justify-content:center;padding:8px 0}
.future-board{width:min(1360px,100%);margin:0 auto}
.fb-title{font-size:40px;color:var(--c-exec-blue);font-weight:800;text-align:center}
.fb-sub{font-style:italic;color:#5b6773;text-align:center;margin:6px 0 10px}
.level{padding:8px 12px;color:#fff;font-size:24px;font-weight:800;background:var(--c-level-blue);margin-top:8px}
.exec-card{max-width:740px;margin:10px auto;background:var(--c-exec-blue);color:#fff;text-align:center;padding:16px;border-radius:4px;font-weight:700;line-height:1.35}
.exec-card .name{font-size:30px;font-weight:800}
.row5{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:8px}
.dr{border:1px solid #7fa0c0;padding:10px;min-height:120px;text-align:center;cursor:pointer}
.dr .name{font-size:23px;font-weight:800}.dr .title{font-size:18px}.dr .meta{font-size:17px;font-weight:700;margin-top:4px}
.dr.support{background:var(--c-support)}.dr.pack{background:var(--c-packaging)}.dr.proc{background:var(--c-processing)}.dr.coe{background:var(--c-coe)}
.section{margin-top:12px;border:1px solid #d8e1ea;background:#fff}
.section .head{padding:8px 12px;font-size:28px;font-weight:800}
.section.pack .head{background:var(--c-packaging);color:#00662a}
.section.proc .head{background:var(--c-processing);color:#886000}
.section.coe .head{background:var(--c-coe);color:#5a32a4}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:8px;padding:8px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:8px;padding:8px}
.fcard{border:1px solid var(--c-card-border);padding:8px;min-height:126px;cursor:pointer;border-radius:6px}
.section.pack .fcard{background:#c4e4c6;border-color:#89be85}
.section.proc .fcard{background:#f2df9b;border-color:#d9b860}
.section.coe .fcard{background:#d4cae7;border-color:#8b67c0}
.fcard .name{font-size:24px;font-weight:800}.fcard .title{font-size:18px;font-style:italic}.fcard .focus{font-size:16px;margin-top:6px}.fcard .status{font-size:16px;margin-top:8px;font-style:italic}
.shared-branch{border:2px dashed #84a98c;border-radius:8px;padding:8px;margin:8px;background:#f8fffa}
.shared-branch .label{font-size:14px;font-weight:700;margin-bottom:4px}
.shared-branch .items{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:8px}
.shared-item{border:1px solid #c6d7c6;border-radius:6px;padding:6px;background:#fff;font-size:13px;line-height:1.3}
.side-note{background:var(--c-side-note);border:1px solid #8a7f00;padding:8px;font-size:18px;display:inline-block;margin-top:8px}
.engineer-notes{font-size:17px;line-height:1.4;padding:8px 12px;color:#8a6600}

.summary,.legend-block{margin-top:10px;background:#2f2f32;color:#fff}
.summary h3,.legend-block h3{margin:0;padding:8px 12px;font-size:24px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;color:#111}
.summary-grid>div{text-align:center;padding:10px}.summary-grid .n{font-size:36px;font-weight:800}
.legend-grid{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;color:#111}
.legend-grid>div{padding:8px;border-right:1px solid #ddd;font-size:14px;line-height:1.35}

.help{margin-top:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;color:#1e3a8a}

/* print clone */
#print-root{display:none}
@media print{
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .controls,.help,.container>h1,#editorModal,.chart-shell{display:none!important}
  #print-root{display:block!important;padding:0;margin:0}
  #print-root .future-wrap{display:block!important;padding:0}
  #print-root .future-board{width:100%!important;max-width:none!important}
  #print-root .card,#print-root .fcard,#print-root .dr{break-inside:avoid-page;page-break-inside:avoid;box-shadow:none}
  @page{size:landscape;margin:.25in}
}
</style>

function parseCSV(t){const rows=[];let c='',q=false,r=[];for(let i=0;i<t.length;i++){const ch=t[i],n=t[i+1];if(ch==='"'){if(q&&n==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;r.push(c);c='';if(r.some(x=>x!==''))rows.push(r);r=[];}else c+=ch;}if(c!==''||r.length){r.push(c);rows.push(r);}const h=rows[0].map(x=>x.trim());return rows.slice(1).map(v=>{const o={};h.forEach((k,i)=>o[k]=(v[i]||'').trim());return o;});}
function toCSV(rows){if(!rows.length)return '';const fields=Object.keys(rows[0]);const esc=v=>{const s=(v??'').toString();return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;};return [fields.join(','),...rows.map(r=>fields.map(f=>esc(r[f])).join(','))].join('\n');}
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function perf(v){const m={high_potential:'⭐ High Potential',promotable:'📈 Promotable',valued_contributor:'✓ Valued Contributor',placement_issue:'⚠️ Placement Issue',too_new:'Too New',vacancy:'Vacancy'};return m[v]||'';}

function nodeHtml(n){const notes=n.notes?`<div class="notes">${esc(n.notes)}</div>`:'';return `<li><div class="card ${n.role_status==='vacant'?'vacant':''}" data-role-id="${n.role_id}"><div class="name">${esc(n.employee_name||'VACANT')}</div><div class="title">${esc(n.title||'')}</div><div class="meta">${esc(n.department||'')} • ${esc(n.state||'')}</div>${notes}</div>${n.children.length?`<ul>${n.children.map(nodeHtml).join('')}</ul>`:''}</li>`;}

          <div class="shared-item" data-role-id="R015">${esc(byId('R015')?.employee_name||'Open')}<br>${esc(focus(byId('R015')||{}))}</div>
          <div class="shared-item" data-role-id="R023">${esc(byId('R023')?.employee_name||'Open')}<br>${esc(focus(byId('R023')||{}))}</div>
          <div class="shared-item" data-role-id="R012">${esc(byId('R012')?.employee_name||'Open')}<br>${esc(focus(byId('R012')||{}))}</div>

    <div class="section coe">
      <div class="head">🏭 MANUFACTURING COE</div>

      <div class="grid3">${roleCard(byId('R035'),'fcard')}${roleCard(byId('R018'),'fcard')}<div class="fcard" data-role-id="R034"><div class="name">↳ ${esc(byId('R034')?.employee_name||'')}</div><div class="title">${esc(byId('R034')?.title||'')}</div><div class="focus">${esc(focus(byId('R034')||{}))}</div><div class="status">${esc(perf(byId('R034')?.performance_label))}</div></div></div>

    <div class="summary"><h3>📊 PERFORMANCE SUMMARY</h3><div class="summary-grid"><div>⭐ High Potential<div class="n">${counts.high_potential}</div></div><div>📈 Promotable<div class="n">${counts.promotable}</div></div><div>✓ Valued Contributor<div class="n">${counts.valued_contributor}</div></div><div>⚠️ Placement Issue<div class="n">${counts.placement_issue}</div></div><div>Vacancy<div class="n">${counts.vacancy}</div></div></div></div>

  </div></div>`;
  if(!forPrint)bindCardClicks(target);
}

function bindCardClicks(root){root.querySelectorAll('[data-role-id]').forEach(el=>el.addEventListener('click',(e)=>{e.stopPropagation();openEditor(el.getAttribute('data-role-id'));}));}
function render(target=chartEl,forPrint=false){if(target===chartEl){document.querySelector('.chart-shell').classList.toggle('future',state.scenario==='future');}if(state.scenario==='future')renderFuture(target,forPrint);else renderCurrent(target,forPrint);} 

function getSelected(){return state.rows.find(r=>r.role_id===state.selectedRoleId&&r.scenario===state.scenario);}
function openEditor(roleId){state.selectedRoleId=roleId;const r=getSelected();if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>document.getElementById('f_'+f).value=r[f]||'');modal.style.display='flex';}
function saveEditor(){const r=getSelected();if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>r[f]=document.getElementById('f_'+f).value.trim());modal.style.display='none';render();}

// Print logic: render full natural-size chart in dedicated print window, then print.
function printFull(){
  printRoot.innerHTML='';
  render(printRoot,true);
  const w=window.open('','_blank','noopener,noreferrer');
  if(!w){window.print();return;}
  const styles=document.querySelector('style').textContent;
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Org Chart Print</title><style>${styles}</style></head><body>${printRoot.innerHTML}</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>{w.print();w.close();printRoot.innerHTML='';},120);
}
window.addEventListener('afterprint',()=>{printRoot.innerHTML='';});

function bind(){document.querySelectorAll('[data-scenario]').forEach(btn=>btn.addEventListener('click',()=>{state.scenario=btn.dataset.scenario;document.querySelectorAll('[data-scenario]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}));
  document.getElementById('printBtn').addEventListener('click',printFull);
  document.getElementById('downloadBtn').addEventListener('click',()=>{const csv=toCSV(state.rows);const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='org_data.csv';a.click();URL.revokeObjectURL(u);});
  document.getElementById('cancelEdit').addEventListener('click',()=>modal.style.display='none');
  document.getElementById('saveEdit').addEventListener('click',saveEditor);
}

async function load(){try{const r=await fetch(`org_data.csv?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error();state.rows=parseCSV(await r.text());}catch(e){state.rows=parseCSV(EMBEDDED_CSV);}bind();render();}
load();
</script>
