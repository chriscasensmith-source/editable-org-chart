<style>
:root{--bg:#f4f6fa;--line:#bfd0e4;--text:#1f2937}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.container{padding:14px}
.controls{position:sticky;top:0;background:#fff;border:1px solid #d7deea;border-radius:10px;padding:8px;display:flex;gap:8px;align-items:center;z-index:10;flex-wrap:wrap}
.tab-btn,.action-btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:7px 10px;cursor:pointer;font-weight:700}
.tab-btn.active{background:#dbeafe}
.subtitle{color:#64748b;margin:8px 0}
.editor{display:none;margin:10px 0;background:#fff;border:1px solid #d7deea;border-radius:10px;padding:10px}
.editor.open{display:block}.editor textarea{width:100%;min-height:160px;font-family:monospace}
.chart-shell{background:#fff;border:1px solid #d7deea;border-radius:12px;overflow:auto;height:calc(100vh - 220px);min-height:540px;padding:12px}
.org-wrap{position:relative;display:inline-block}
.org-svg{position:absolute;left:0;top:0;pointer-events:none}
.node{position:absolute;width:220px;min-height:112px;border:1px solid #b8c4d9;border-radius:10px;padding:10px 10px 8px;box-sizing:border-box;background:#fff}
.node .name{font-size:17px;font-weight:800;line-height:1.2}.node .title{font-size:14px;color:#334155;margin-top:2px;line-height:1.3}.node .meta{font-size:12px;color:#64748b;margin-top:4px}
.node .notes{font-size:11px;color:#475569;border-top:1px dashed rgba(71,85,105,.3);margin-top:6px;padding-top:5px;line-height:1.3}
.node.vacant{border-style:dashed}
.help{margin-top:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;color:#1e3a8a}
.legend{margin-left:auto;display:flex;gap:8px;font-size:12px;color:#475569;flex-wrap:wrap}
.sw{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
@media print{.controls,.editor,.help,#dataSourceMessage{display:none!important}.chart-shell{height:auto;border:0;overflow:visible;padding:0}@page{size:17in 11in;margin:.25in}}
</style>

<body>

    <button id="editToggle" class="action-btn">Edit Data</button>
    <button id="printBtn" class="action-btn">Print / Export PDF</button>
    <div id="legend" class="legend"></div>
  </div>
  <div id="editorPanel" class="editor">
    <textarea id="csvEditor"></textarea>
    <div style="margin-top:8px;display:flex;gap:8px"><button id="applyEditsBtn" class="action-btn">Apply Edits</button><button id="downloadCsvBtn" class="action-btn">Download CSV</button></div>
    <div id="editorMessage" class="subtitle"></div>
  </div>

  <div class="help">Executive-ready compact tree: centered CEO, balanced levels, fixed card sizes, straight connector lines, and subtle department color coding.</div>

const DEPT_COLORS=['#f2f8ff','#eefaf3','#fff8ec','#f5f0ff','#eef7f7','#fff1f2','#f8f5ef','#ecfbff'];

function parseCSV(t){const rows=[];let c='',q=false,r=[];for(let i=0;i<t.length;i++){const ch=t[i],n=t[i+1];if(ch==='"'){if(q&&n==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;r.push(c);c='';if(r.some(x=>x!==''))rows.push(r);r=[];}else c+=ch;}if(c!==''||r.length){r.push(c);rows.push(r);}if(!rows.length)return[];const h=rows[0].map(x=>x.trim());return rows.slice(1).map(v=>{const o={};h.forEach((k,i)=>o[k]=(v[i]||'').trim());return o;});}
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function perf(v){const m={high_potential:'High Potential',promotable:'Promotable',valued_contributor:'Valued Contributor',placement_issue:'Placement Issue',too_new:'Too New',vacancy:'Vacancy'};return m[v]||'';}

function buildTree(rows){const map=new Map(rows.map(r=>[r.role_id,{...r,children:[],width:1,x:0,y:0}]));map.forEach(n=>{if(n.manager_role_id&&map.has(n.manager_role_id))map.get(n.manager_role_id).children.push(n)});const root=map.get('R001');if(!root)return null;const sort=(a,b)=>(a.title||'').localeCompare(b.title||'')||(a.employee_name||'').localeCompare(b.employee_name||'');map.forEach(n=>n.children.sort(sort));return root;}
function measure(node){if(!node.children.length){node.width=1;return 1;}let total=0;node.children.forEach((c,i)=>{total+=measure(c);if(i)total+=0.45});node.width=Math.max(1,total);return node.width;}
function place(node,left,depth){node.x=left+node.width/2;node.y=depth;let cursor=left;node.children.forEach((c,i)=>{place(c,cursor,depth+1);cursor+=c.width+0.45;});}
function flatten(node,arr=[]){arr.push(node);node.children.forEach(c=>flatten(c,arr));return arr;}
function deptMap(rows){const d=[...new Set(rows.map(r=>r.department||'Unassigned'))].sort();const m={};d.forEach((name,i)=>m[name]=DEPT_COLORS[i%DEPT_COLORS.length]);return m;}
function renderLegend(colorMap){legendEl.innerHTML=Object.entries(colorMap).slice(0,8).map(([d,c])=>`<span><span class="sw" style="background:${c}"></span>${esc(d)}</span>`).join('');}

function renderOrg(){const rows=state.rows.filter(r=>r.scenario===state.scenario);const root=buildTree(rows);if(!root){chartEl.innerHTML='<div>Missing R001 for selected scenario.</div>';return;}measure(root);place(root,0,0);const nodes=flatten(root);const colorMap=deptMap(rows);renderLegend(colorMap);
const WX=260,WY=170,NW=220,NH=112,P=30;const maxX=Math.max(...nodes.map(n=>n.x)),maxY=Math.max(...nodes.map(n=>n.y));
const width=Math.ceil(maxX*WX+NW/2+P),height=Math.ceil((maxY+1)*WY+NH+P);
let svg='';
for(const n of nodes){for(const c of n.children){const x1=n.x*WX,y1=n.y*WY+NH;const x2=c.x*WX,y2=c.y*WY;const mid=(y1+y2)/2;svg+=`<path d="M${x1} ${y1} V${mid} H${x2} V${y2}" fill="none" stroke="var(--line)" stroke-width="2"/>`;}}
const html=nodes.map(n=>{const left=n.x*WX-NW/2,top=n.y*WY;const f=[n.future_focus_1,n.future_focus_2,n.future_focus_3].filter(Boolean).join(' | ');const notes=state.scenario==='future'?[perf(n.performance_label),f,n.notes].filter(Boolean).join(' • '):n.notes;const bg=colorMap[n.department||'Unassigned']||'#fff';return `<div class="node ${n.role_status==='vacant'?'vacant':''}" style="left:${left}px;top:${top}px;background:${bg};"><div class="name">${esc(n.employee_name||'VACANT')}</div><div class="title">${esc(n.title||'')}</div><div class="meta">${esc(n.department||'')} • ${esc(n.state||'')}</div>${notes?`<div class="notes">${esc(notes)}</div>`:''}</div>`;}).join('');
chartEl.innerHTML=`<div class="org-wrap" style="width:${width}px;height:${height}px"><svg class="org-svg" width="${width}" height="${height}">${svg}</svg>${html}</div>`;
fitToViewport();
}

function fitToViewport(){const shell=document.querySelector('.chart-shell');const wrap=document.querySelector('.org-wrap');if(!shell||!wrap)return;wrap.style.transform='scale(1)';wrap.style.transformOrigin='top left';const scale=Math.min(1,(shell.clientWidth-16)/wrap.offsetWidth);wrap.style.transform=`scale(${scale})`;shell.style.minHeight=`${Math.ceil(wrap.offsetHeight*scale)+24}px`;}
function syncEditor(){csvEditorEl.value=state.rawCSV;editorMessageEl.textContent='';}
function applyEdits(){const raw=csvEditorEl.value,p=parseCSV(raw);if(!p.length){editorMessageEl.textContent='CSV parse error.';return;}state.rawCSV=raw;state.rows=p;renderOrg();editorMessageEl.textContent='Edits applied in browser.';}
function downloadCsv(){const b=new Blob([csvEditorEl.value],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='org_data.csv';a.click();URL.revokeObjectURL(u)}
function bindEvents(){document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{state.scenario=btn.dataset.scenario;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderOrg();}));document.getElementById('editToggle').addEventListener('click',()=>{editorPanelEl.classList.toggle('open');if(editorPanelEl.classList.contains('open'))syncEditor();});document.getElementById('applyEditsBtn').addEventListener('click',applyEdits);document.getElementById('downloadCsvBtn').addEventListener('click',downloadCsv);document.getElementById('printBtn').addEventListener('click',()=>window.print());window.addEventListener('resize',fitToViewport);}
async function loadData(){try{const r=await fetch(`org_data.csv?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error();state.rawCSV=await r.text();state.rows=parseCSV(state.rawCSV);document.getElementById('dataSourceMessage').textContent='Loaded live data from org_data.csv.';}catch(e){state.rawCSV=EMBEDDED_CSV;state.rows=parseCSV(state.rawCSV);document.getElementById('dataSourceMessage').textContent='Using embedded fallback data.';}bindEvents();renderOrg();}
loadData();
</script>
</body></html>
