<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editable Org Chart</title>
<style>
:root{
  --bg:#f4f6fa;--panel:#fff;--border:#d5deea;--line:#bfd0e4;--text:#1f2937;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1560px;margin:0 auto;padding:14px}
h1{margin:0 0 8px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;position:sticky;top:0;z-index:10}
.btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:7px 11px;font-weight:700;cursor:pointer}
.btn.active{background:#dbeafe}
.legend{margin-left:auto;font-size:12px;color:#64748b}
.chart-shell{margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;overflow:auto;min-height:620px;max-height:78vh}
.chart-inner{position:relative;display:inline-block;transform-origin:top left}
.chart-svg{position:absolute;inset:0;pointer-events:none}
.node{position:absolute;width:230px;min-height:118px;border:1px solid #b8c4d9;border-radius:10px;padding:10px;background:#fff;box-shadow:0 1px 4px rgba(15,23,42,.06);cursor:pointer;break-inside:avoid-page}
.node:hover{box-shadow:0 4px 12px rgba(15,23,42,.13)}
.node.selected{outline:3px solid #60a5fa}
.node.vacant{border-style:dashed}
.node .name{font-size:17px;font-weight:800;line-height:1.2}
.node .title{font-size:14px;font-weight:600;color:#334155;line-height:1.25;margin-top:2px;word-break:break-word}
.node .meta{font-size:12px;color:#64748b;margin-top:5px}
.node .notes{font-size:11px;color:#475569;margin-top:7px;border-top:1px dashed rgba(71,85,105,.3);padding-top:6px;line-height:1.3;word-break:break-word}
.help{margin-top:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;color:#1e3a8a}

/* modal editor */
#editorModal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50}
#editorModal.open{display:flex}
.modal{background:#fff;width:min(840px,95vw);max-height:90vh;overflow:auto;border-radius:12px;padding:14px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:10px}
.grid label{font-size:12px;color:#475569;display:flex;flex-direction:column;gap:4px}
.grid input,.grid select,.grid textarea{border:1px solid #cbd5e1;border-radius:8px;padding:8px;font:inherit;font-size:13px}
.grid textarea{min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}

/* hidden container used only for reliable print rendering */
#print-root{display:none}

@media print{
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .controls,.help,#editorModal,.container>h1,.container>.subtitle,.chart-shell{display:none!important}
  #print-root{display:block!important;padding:0!important;margin:0!important}
  #print-root .chart-inner{transform:none!important}
  #print-root .node{box-shadow:none;break-inside:avoid-page;page-break-inside:avoid}
  #print-root .chart-svg path{stroke:#8ea4bf;stroke-width:1.6}
  @page{size:17in 11in;margin:.3in}
}
</style>
</head>
<body>
<div class="container">
  <h1>Operations Org Chart</h1>
  <div class="controls">
    <button class="btn active" data-scenario="current">Current State</button>
    <button class="btn" data-scenario="future">Proposed Future State</button>
    <button id="printBtn" class="btn">Print / Export PDF</button>
    <button id="downloadBtn" class="btn">Download Updated CSV</button>
    <div class="legend">Click a role card to edit</div>
  </div>

  <div class="chart-shell"><div id="chart"></div></div>
  <div class="help">Balanced top-down tree, clean connectors, and full-chart printing through the Print / Export button.</div>
</div>

<div id="editorModal">
  <div class="modal">
    <h3 style="margin:0 0 10px">Edit Role</h3>
    <div class="grid">
      <label>Employee Name<input id="f_employee_name"></label>
      <label>Title<input id="f_title"></label>
      <label>Manager Role ID<input id="f_manager_role_id"></label>
      <label>Department<input id="f_department"></label>
      <label>State<input id="f_state"></label>
      <label>Role Status<select id="f_role_status"><option>filled</option><option>vacant</option></select></label>
      <label>Performance Label<input id="f_performance_label"></label>
      <label>Future Focus 1<input id="f_future_focus_1"></label>
      <label>Future Focus 2<input id="f_future_focus_2"></label>
      <label>Future Focus 3<input id="f_future_focus_3"></label>
      <label style="grid-column:1/-1">Notes<textarea id="f_notes"></textarea></label>
    </div>
    <div class="modal-actions">
      <button id="cancelEdit" class="btn">Cancel</button>
      <button id="saveEdit" class="btn" style="background:#dbeafe">Save</button>
    </div>
  </div>
</div>

<!-- Print-only rendering mount -->
<div id="print-root"></div>

const chartEl=document.getElementById('chart');
const printRoot=document.getElementById('print-root');
const modal=document.getElementById('editorModal');
const NODE_W=230,LEVEL_H=175,NODE_H=118,SIBLING_GAP=0.42,LEFT_PAD=30;
const DEPT_COLORS=['#f2f8ff','#eefaf3','#fff8ec','#f5f0ff','#eef7f7','#fff1f2','#f8f5ef','#ecfbff'];

function parseCSV(t){const rows=[];let c='',q=false,r=[];for(let i=0;i<t.length;i++){const ch=t[i],n=t[i+1];if(ch==='"'){if(q&&n==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;r.push(c);c='';if(r.some(x=>x!==''))rows.push(r);r=[];}else c+=ch;}if(c!==''||r.length){r.push(c);rows.push(r);}const h=rows[0].map(x=>x.trim());return rows.slice(1).map(v=>{const o={};h.forEach((k,i)=>o[k]=(v[i]||'').trim());return o;});}
function toCSV(rows){if(!rows.length)return '';const fields=Object.keys(rows[0]);const esc=v=>{const s=(v??'').toString();return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;};return [fields.join(','),...rows.map(r=>fields.map(f=>esc(r[f])).join(','))].join('\n');}
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function perf(v){const m={high_potential:'High Potential',promotable:'Promotable',valued_contributor:'Valued Contributor',placement_issue:'Placement Issue',too_new:'Too New',vacancy:'Vacancy'};return m[v]||'';}

function buildTree(rows){const map=new Map(rows.map(r=>[r.role_id,{...r,children:[],w:1,x:0,y:0}]));map.forEach(n=>{if(n.manager_role_id&&map.has(n.manager_role_id))map.get(n.manager_role_id).children.push(n)});const root=map.get('R001');if(!root)return null;const sort=(a,b)=>(a.title||'').localeCompare(b.title||'')||(a.employee_name||'').localeCompare(b.employee_name||'');map.forEach(n=>n.children.sort(sort));return root;}
function measure(n){if(!n.children.length){n.w=1;return 1;}let total=0;n.children.forEach((c,i)=>{total+=measure(c);if(i)total+=SIBLING_GAP});n.w=Math.max(1,total);return n.w;}
function place(n,left,depth){n.x=left+n.w/2;n.y=depth;let cur=left;n.children.forEach(c=>{place(c,cur,depth+1);cur+=c.w+SIBLING_GAP;});}
function flatten(n,a=[]){a.push(n);n.children.forEach(c=>flatten(c,a));return a;}
function deptMap(rows){const d=[...new Set(rows.map(r=>r.department||'Unassigned'))].sort();const m={};d.forEach((k,i)=>m[k]=DEPT_COLORS[i%DEPT_COLORS.length]);return m;}

/**
 * Core renderer used for screen and print.
 * forPrint=true disables click handlers and scaling transforms.
 */
function renderChart(target,{forPrint=false}={}){
  const rows=state.rows.filter(r=>r.scenario===state.scenario);
  const root=buildTree(rows);
  if(!root){target.innerHTML='<p>Missing root role (R001).</p>';return null;}
  measure(root);place(root,0,0);
  const nodes=flatten(root),colors=deptMap(rows);
  const maxX=Math.max(...nodes.map(n=>n.x)),maxY=Math.max(...nodes.map(n=>n.y));
  const width=Math.ceil(maxX*NODE_W+NODE_W/2+LEFT_PAD),height=Math.ceil((maxY+1)*LEVEL_H+NODE_H+LEFT_PAD);

  let lines='';
  for(const n of nodes){
    for(const c of n.children){
      const x1=n.x*NODE_W,y1=n.y*LEVEL_H+NODE_H,x2=c.x*NODE_W,y2=c.y*LEVEL_H,mid=(y1+y2)/2;
      lines+=`<path d="M${x1} ${y1} V${mid} H${x2} V${y2}" fill="none" stroke="var(--line)" stroke-width="2"/>`;
    }
  }

  const cards=nodes.map(n=>{
    const left=n.x*NODE_W-NODE_W/2,top=n.y*LEVEL_H;
    const f=[n.future_focus_1,n.future_focus_2,n.future_focus_3].filter(Boolean).join(' | ');
    const notes=state.scenario==='future'?[perf(n.performance_label),f,n.notes].filter(Boolean).join(' • '):n.notes;
    const selected=n.role_id===state.selectedRoleId?'selected':'';
    return `<div class="node ${selected} ${n.role_status==='vacant'?'vacant':''}" data-role-id="${n.role_id}" style="left:${left}px;top:${top}px;background:${colors[n.department||'Unassigned']||'#fff'}"><div class="name">${esc(n.employee_name||'VACANT')}</div><div class="title">${esc(n.title||'')}</div><div class="meta">${esc(n.department||'')} • ${esc(n.state||'')}</div>${notes?`<div class="notes">${esc(notes)}</div>`:''}</div>`;
  }).join('');

  target.innerHTML=`<div class="chart-inner" style="width:${width}px;height:${height}px"><svg class="chart-svg" width="${width}" height="${height}">${lines}</svg>${cards}</div>`;

  if(!forPrint){
    target.querySelectorAll('.node').forEach(el=>el.addEventListener('click',()=>openEditor(el.dataset.roleId)));
    fitToViewport();
  }

  return {width,height};
}

function fitToViewport(){
  const shell=document.querySelector('.chart-shell');
  const inner=chartEl.querySelector('.chart-inner');
  if(!shell||!inner) return;
  inner.style.transform='scale(1)';
  const scale=Math.min(1,(shell.clientWidth-16)/inner.offsetWidth);
  inner.style.transformOrigin='top left';
  inner.style.transform=`scale(${scale})`;
  // Keep container tall enough after scaling to avoid clipped bottom nodes.
  shell.style.minHeight=`${Math.ceil(inner.offsetHeight*scale)+30}px`;
}

function getSelectedRow(){return state.rows.find(r=>r.role_id===state.selectedRoleId&&r.scenario===state.scenario);}
function openEditor(roleId){state.selectedRoleId=roleId;const r=getSelectedRow();if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>document.getElementById('f_'+f).value=r[f]||'');modal.classList.add('open');renderChart(chartEl);}
function saveEditor(){const r=getSelectedRow();if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>r[f]=document.getElementById('f_'+f).value.trim());modal.classList.remove('open');renderChart(chartEl);}

/**
 * Print flow:
 * 1) Render a full-size, unscaled chart clone into #print-root
 * 2) Call window.print()
 * 3) Clear print DOM in afterprint
 * This avoids printing only the visible scroll viewport.
 */
function printFullChart(){
  printRoot.innerHTML='';
  renderChart(printRoot,{forPrint:true});
  window.print();
}
function clearPrintRoot(){printRoot.innerHTML='';}

function bind(){
  document.querySelectorAll('[data-scenario]').forEach(btn=>btn.addEventListener('click',()=>{
    state.scenario=btn.dataset.scenario;
    document.querySelectorAll('[data-scenario]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.selectedRoleId=null;
    modal.classList.remove('open');
    renderChart(chartEl);
  }));
  document.getElementById('downloadBtn').addEventListener('click',()=>{const csv=toCSV(state.rows);const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='org_data.csv';a.click();URL.revokeObjectURL(url);});
  document.getElementById('printBtn').addEventListener('click',printFullChart);
  document.getElementById('cancelEdit').addEventListener('click',()=>modal.classList.remove('open'));
  document.getElementById('saveEdit').addEventListener('click',saveEditor);
  window.addEventListener('resize',fitToViewport);
  window.addEventListener('afterprint',clearPrintRoot);
}

async function load(){
  try{const r=await fetch(`org_data.csv?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error();state.rows=parseCSV(await r.text());}
  catch(e){state.rows=parseCSV(EMBEDDED_CSV);}
  bind();
  renderChart(chartEl);
}
load();
</script>
