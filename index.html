<title>Editable Org Chart</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f7fb;color:#1f2937}
.container{max-width:1500px;margin:0 auto;padding:14px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid #d5deea;border-radius:10px;padding:10px;position:sticky;top:0;z-index:10}
.btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:7px 11px;font-weight:700;cursor:pointer}.btn.active{background:#dbeafe}
.chart-shell{background:#fff;border:1px solid #d5deea;border-radius:12px;padding:14px;overflow:auto;min-height:600px}
.tree ul{padding-top:24px;position:relative;display:flex;justify-content:center;margin:0;width:max-content}
.tree li{list-style:none;text-align:center;position:relative;padding:24px 10px 0;min-width:240px}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid #cbd5e1;width:50%;height:24px}
.tree li::after{right:auto;left:50%;border-left:2px solid #cbd5e1}
.tree li:only-child::before,.tree li:only-child::after{display:none}.tree li:first-child::before,.tree li:last-child::after{border:0}.tree li:last-child::before{border-right:2px solid #cbd5e1}.tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid #cbd5e1;height:24px}
.card{background:#fff;border:1px solid #b8c4d9;border-left:6px solid #4b83d6;border-radius:10px;padding:10px;text-align:left;max-width:260px;min-height:100px;cursor:pointer}
.card:hover{box-shadow:0 1px 6px rgba(15,23,42,.12)}.card.vacant{border-left-color:#f97316;background:#fff7ed}
.name{font-weight:800;font-size:16px}.title{font-size:14px;color:#334155}.meta{font-size:12px;color:#64748b;margin-top:4px}.notes{font-size:11px;color:#475569;margin-top:6px;border-top:1px dashed #cbd5e1;padding-top:5px}
.legend{margin-left:auto;font-size:12px;color:#64748b}
#editorModal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50}
#editorModal.open{display:flex}
.modal{background:#fff;width:min(760px,95vw);max-height:90vh;overflow:auto;border-radius:12px;padding:14px}
.modal h3{margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px}
.grid label{font-size:12px;color:#475569;display:flex;flex-direction:column;gap:4px}
.grid input,.grid select,.grid textarea{border:1px solid #cbd5e1;border-radius:8px;padding:8px;font:inherit;font-size:13px}
.grid textarea{min-height:68px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.help{margin-top:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;color:#1e3a8a}
@media print{.controls,.help{display:none!important}.chart-shell{border:0;padding:0}@page{size:17in 11in;margin:.25in}}
</style>
</head>
<body>
<div class="container">
  <h1 style="margin:0 0 8px">Operations Org Chart</h1>
  <div class="controls">
    <button class="btn active" data-scenario="current">Current State</button>
    <button class="btn" data-scenario="future">Proposed Future State</button>
    <button id="downloadBtn" class="btn">Download Updated CSV</button>
    <button id="printBtn" class="btn">Print / Export PDF</button>
    <div class="legend">Click a role card to edit</div>
  </div>

  <div class="chart-shell"><div id="chart"></div></div>
  <div class="help">Simple workflow: click card → edit → save. No manual CSV editing needed.</div>
</div>

<div id="editorModal">
  <div class="modal">
    <h3>Edit Role</h3>
    <div class="grid">
      <label>Employee Name<input id="f_employee_name"></label>
      <label>Title<input id="f_title"></label>
      <label>Manager Role ID<input id="f_manager_role_id"></label>
      <label>Department<input id="f_department"></label>
      <label>State<input id="f_state"></label>
      <label>Role Status<select id="f_role_status"><option>filled</option><option>vacant</option></select></label>
      <label>Performance Label<input id="f_performance_label"></label>
      <label>Future Focus 1<input id="f_future_focus_1"></label>
      <label>Future Focus 2<input id="f_future_focus_2"></label>
      <label>Future Focus 3<input id="f_future_focus_3"></label>
      <label style="grid-column:1/-1">Notes<textarea id="f_notes"></textarea></label>
    </div>
    <div class="modal-actions">
      <button id="cancelEdit" class="btn">Cancel</button>
      <button id="saveEdit" class="btn" style="background:#dbeafe">Save</button>
    </div>
  </div>
</div>

const chartEl=document.getElementById('chart');
const modal=document.getElementById('editorModal');

function parseCSV(t){const rows=[];let c='',q=false,r=[];for(let i=0;i<t.length;i++){const ch=t[i],n=t[i+1];if(ch==='"'){if(q&&n==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;r.push(c);c='';if(r.some(x=>x!==''))rows.push(r);r=[];}else c+=ch;}if(c!==''||r.length){r.push(c);rows.push(r);}const h=rows[0].map(x=>x.trim());return rows.slice(1).map(v=>{const o={};h.forEach((k,i)=>o[k]=(v[i]||'').trim());return o;});}
function toCSV(rows){if(!rows.length)return '';const fields=Object.keys(rows[0]);const esc=v=>{const s=(v??'').toString();return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;};return [fields.join(','),...rows.map(r=>fields.map(f=>esc(r[f])).join(','))].join('\n');}
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function buildTree(rows){const map=new Map(rows.map(r=>[r.role_id,{...r,children:[]}])) ;map.forEach(n=>{if(n.manager_role_id&&map.has(n.manager_role_id))map.get(n.manager_role_id).children.push(n)});const root=map.get('R001');if(!root)return null;const sort=(a,b)=>(a.title||'').localeCompare(b.title||'')||(a.employee_name||'').localeCompare(b.employee_name||'');map.forEach(n=>n.children.sort(sort));return root;}
function renderNode(n){const f=[n.future_focus_1,n.future_focus_2,n.future_focus_3].filter(Boolean).join(' | ');const notes=state.scenario==='future'?[n.performance_label,f,n.notes].filter(Boolean).join(' • '):n.notes;return `<li><div class="card ${n.role_status==='vacant'?'vacant':''}" data-role-id="${n.role_id}"><div class="name">${esc(n.employee_name||'VACANT')}</div><div class="title">${esc(n.title||'')}</div><div class="meta">${esc(n.department||'')} • ${esc(n.state||'')}</div>${notes?`<div class="notes">${esc(notes)}</div>`:''}</div>${n.children.length?`<ul>${n.children.map(renderNode).join('')}</ul>`:''}</li>`;}
function render(){const rows=state.rows.filter(r=>r.scenario===state.scenario);const root=buildTree(rows);if(!root){chartEl.innerHTML='<p>Missing root role (R001).</p>';return;}chartEl.innerHTML=`<div class="tree"><ul>${renderNode(root)}</ul></div>`;chartEl.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openEditor(c.dataset.roleId)));}

function openEditor(roleId){state.selectedRoleId=roleId;const r=state.rows.find(x=>x.role_id===roleId&&x.scenario===state.scenario);if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>document.getElementById('f_'+f).value=r[f]||'');modal.classList.add('open');}
function saveEditor(){const r=state.rows.find(x=>x.role_id===state.selectedRoleId&&x.scenario===state.scenario);if(!r)return;['employee_name','title','manager_role_id','department','state','role_status','performance_label','future_focus_1','future_focus_2','future_focus_3','notes'].forEach(f=>r[f]=document.getElementById('f_'+f).value.trim());modal.classList.remove('open');render();}

function bind(){document.querySelectorAll('[data-scenario]').forEach(b=>b.addEventListener('click',()=>{state.scenario=b.dataset.scenario;document.querySelectorAll('[data-scenario]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}));document.getElementById('downloadBtn').addEventListener('click',()=>{const csv=toCSV(state.rows);const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='org_data.csv';a.click();URL.revokeObjectURL(url);});document.getElementById('printBtn').addEventListener('click',()=>window.print());document.getElementById('cancelEdit').addEventListener('click',()=>modal.classList.remove('open'));document.getElementById('saveEdit').addEventListener('click',saveEditor);}

async function load(){try{const r=await fetch(`org_data.csv?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error();state.rows=parseCSV(await r.text());}catch(e){state.rows=parseCSV(EMBEDDED_CSV);}bind();render();}
load();
</script>
